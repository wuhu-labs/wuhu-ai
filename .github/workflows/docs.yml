name: Docs

on:
  push:
    branches: [main]

jobs:
  docs:
    name: Deploy DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Build with symbol graphs
        run: |
          xcrun swift build --target WuhuAI \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir -Xswiftc .build/symbol-graphs

      - name: Filter symbol graphs
        run: |
          mkdir -p .build/target-symbols
          cp .build/symbol-graphs/WuhuAI*.json .build/target-symbols/

      - name: Generate DocC
        run: |
          xcrun docc convert \
            --additional-symbol-graph-dir .build/target-symbols \
            --output-dir .build/docs \
            --hosting-base-path docs/wuhu-ai \
            --fallback-display-name WuhuAI \
            --fallback-bundle-identifier ai.wuhu.WuhuAI \
            --fallback-bundle-version 0.1.0

      - name: Deploy to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          cd .build/docs
          find . -type f | while read -r file; do
            key="${file#./}"
            case "$file" in
              *.html) ct="text/html" ;;
              *.css)  ct="text/css" ;;
              *.js)   ct="application/javascript" ;;
              *.json) ct="application/json" ;;
              *.svg)  ct="image/svg+xml" ;;
              *.jpg|*.jpeg) ct="image/jpeg" ;;
              *.png)  ct="image/png" ;;
              *)      ct="application/octet-stream" ;;
            esac
            wrangler r2 object put "wuhu-site/docs/wuhu-ai/$key" --file="$file" --content-type="$ct" --remote
          done
