name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (Swift 6.2)
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  macos:
    name: macOS (Swift 6.2)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Xcode (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"
      - name: Swift version
        run: xcrun swift --version
      - name: Build
        run: xcrun swift build
      - name: Test
        run: xcrun swift test
